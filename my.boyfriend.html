<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кассета</title>
  <style>
    :root {
      --pink-1: #ff2d95;
      --pink-2: #ff8fc7;
      --pink-3: #ffd3e8;
      --dark-1: #050505;
      --dark-2: #101010;
      --shadow: rgba(0, 0, 0, 0.55);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 45, 149, 0.55), transparent 28%),
        radial-gradient(circle at 80% 78%, rgba(255, 45, 149, 0.28), transparent 28%),
        linear-gradient(180deg, var(--dark-1), var(--dark-2));
    }

    .flowers {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .flower {
      position: absolute;
      top: -48px;
      font-size: 18px;
      opacity: 0.9;
      animation: fall linear forwards;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.12));
    }

    @keyframes fall {
      to {
        transform: translateY(112vh) rotate(360deg);
        opacity: 0.75;
      }
    }

    .scene {
      position: relative;
      z-index: 1;
      width: min(92vw, 700px);
      display: grid;
      place-items: center;
      padding: 10px 18px 10px;
      gap: 8px;
    }

    .cassette {
      width: min(92vw, 620px);
      aspect-ratio: 1.48 / 1;
      position: relative;
      border-radius: 26px;
      padding: 22px;
      background: linear-gradient(135deg, var(--pink-3), var(--pink-2));
      border: 3px solid rgba(255,255,255,0.52);
      box-shadow:
        0 24px 70px var(--shadow),
        inset 0 1px 0 rgba(255,255,255,0.45);
      z-index: 2;
    }

    .cassette::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.22);
      pointer-events: none;
    }

    .sticker {
      position: absolute;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      width: 72%;
      height: 82px;
      border-radius: 16px;
      background: rgba(255, 245, 250, 0.96);
      border: 2px solid rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      color: #c2185b;
      text-align: center;
      font-family: "Brush Script MT", "Segoe Script", cursive;
      font-size: clamp(20px, 2.8vw, 30px);
      letter-spacing: 0.02em;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12), inset 0 0 0 2px rgba(255,255,255,0.55);
      z-index: 2;
    }

    .window {
      position: absolute;
      left: 50%;
      top: 118px;
      transform: translateX(-50%);
      width: 82%;
      height: 124px;
      border-radius: 18px;
      background: linear-gradient(180deg, #1a1a1a, #090909);
      border: 3px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 0 18px rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(28px, 7vw, 58px);
      overflow: hidden;
    }

    .reel {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      position: relative;
      flex: 0 0 auto;
      background:
        radial-gradient(circle at center, #f9fafb 0 10px, #9ca3af 10px 14px, #2b2b2b 14px 100%);
      box-shadow: 0 0 0 8px rgba(255,255,255,0.03);
      animation: spin 1.25s linear infinite paused;
      will-change: transform;
    }

    .reel::before,
    .reel::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 66px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.56);
      transform-origin: center;
      transform: translate(-50%, -50%) rotate(0deg);
    }

    .reel::after {
      transform: translate(-50%, -50%) rotate(90deg);
    }

    .reel.right::before { transform: translate(-50%, -50%) rotate(45deg); }
    .reel.right::after  { transform: translate(-50%, -50%) rotate(135deg); }

    .playing .reel {
      animation-play-state: running;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .slots {
      position: absolute;
      left: 50%;
      bottom: 84px;
      transform: translateX(-50%);
      width: 60%;
      display: flex;
      justify-content: space-between;
      opacity: 0.9;
    }

    .slot {
      width: 30px;
      height: 48px;
      border-radius: 8px;
      background: linear-gradient(180deg, #111, #000);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
    }

    .heart {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: 74px;
      height: 74px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      background: radial-gradient(circle at 30% 30%, #ffb3d0, #ff4d88 70%);
      color: #fff;
      font-size: 30px;
      line-height: 1;
      box-shadow: 0 12px 28px rgba(255, 77, 136, 0.45), inset 0 1px 0 rgba(255,255,255,0.35);
      z-index: 5;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
      pointer-events: auto;
    }

    .heart:hover {
      transform: translateX(-50%) scale(1.06);
      filter: brightness(1.04);
      box-shadow: 0 14px 32px rgba(255, 77, 136, 0.55), inset 0 1px 0 rgba(255,255,255,0.4);
    }

    .heart:active {
      transform: translateX(-50%) scale(0.96);
    }

    .hint {
      margin-top: 12px;
      color: rgba(255,255,255,0.82);
      font-size: 14px;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0,0,0,0.35);
    }

    #loveText {
      z-index: 999;
    }

    .progressWrap {
      width: min(92vw, 620px);
      margin-top: 2px;
      z-index: 2;
    }

    .progress {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      overflow: hidden;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
    }

    .bar {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #fff, #ff4d88);
    }

    .time {
      margin-top: 6px;
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0,0,0,0.35);
    }

    @media (max-width: 520px) {
      .cassette { border-radius: 22px; }
      .window { height: 110px; top: 110px; }
      .reel { width: 74px; height: 74px; }
      .reel::before,
      .reel::after { width: 54px; }
      .slots { bottom: 74px; width: 66%; }
      .slot { width: 24px; height: 42px; }
      .heart { width: 66px; height: 66px; font-size: 26px; }
      .sticker { height: 72px; }
    }
  </style>
</head>
<body>
  <div class="flowers" id="flowers"></div>

  <div class="scene">
    <div style="text-align:center; margin-bottom:10px;">
      <div style="font-size:56px; font-weight:800; color:white; text-shadow:0 0 14px #ff4d88,0 0 28px #ff2d95;">
        29.05.2025
      </div>
      <div style="font-size:14px; color:#ffd6ea; text-shadow:0 0 8px #ff2d95;">
        день, когда мы оба влюбились навсегда
      </div>
    </div>

    <div id="kiss" style="cursor:pointer; margin-bottom:12px; display:flex; align-items:center; justify-content:center;">
      <span style="font-size:46px;">✉️</span>
    </div>

    <div id="loveText" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); max-width:600px; width:80%; background:rgba(0,0,0,0.85); color:white; padding:24px; border-radius:18px; text-align:center; line-height:1.7; z-index:10; box-shadow:0 0 30px rgba(255,77,136,0.4);"></div>

    <div class="cassette" id="cassette">
      <div class="sticker">𝕤𝕠𝕟𝕘𝕤 𝕗𝕠𝕣 𝕪𝕠𝕦𝕣 𝕝𝕠𝕧𝕖𝕕 𝕠𝕟𝕖</div>

      <div class="window">
        <div class="reel left"></div>
        <div class="reel right"></div>
      </div>

      <div class="slots" aria-hidden="true">
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
      </div>

      <button class="heart" id="heartBtn" aria-label="Включить музыку">❤</button>
    </div>

    <div class="progressWrap">
      <div class="progress" id="progress">
        <div class="bar" id="bar"></div>
      </div>
      <div class="time" id="time">0:00 / 0:00</div>
    </div>

    <div class="hint" id="hint">нажми на сердечко</div>
  </div>

  <div style="position:fixed; bottom:40px; left:50%; transform:translateX(-50%); display:flex; gap:14px; z-index:2;">
    <button id="missBtn" style="display:flex; align-items:center; gap:6px; padding:10px 16px; border:none; border-radius:20px; background:rgba(255,77,136,0.15); color:#fff; font-size:14px; cursor:pointer; box-shadow:0 0 12px #ff4d88, 0 0 24px #ff2d95;">
      <span id="missCount">0</span> скучаю котик ❤
    </button>
    <button id="loveBtn" style="padding:10px 16px; border:none; border-radius:20px; background:rgba(255,77,136,0.15); color:white; font-size:14px; cursor:pointer; box-shadow:0 0 12px #ff4d88, 0 0 24px #ff2d95;">
      люблю тебя ❤
    </button>
  </div>

  <div id="resetTimer" style="position:fixed; bottom:0; left:50%; transform:translateX(-50%); color:white; font-size:12px; opacity:0.8; margin-bottom:4px;"></div>

  <audio id="audioPlayer" preload="auto" playsinline></audio>

  <script>
    (function () {
      const playlist = [
        'Каспийский Груз - Любовь HD1080.mp3',
        'GONE.Fludd & M00NCHILD - Рядом С Тобой.mp3',
        'Face - 24 на 7 (1).mp3',
        'Катя Мильтей & Oneheart - Построю город мечты.mp3',
        'жанулька - Ты похож на кота (ремастер).mp3',
        'Скриптонит - Это Любовь.mp3',
        'Lizer - Между Нами.mp3',
        'Скриптонит feat. Чаруша - Космос.mp3',
        'Asyamf У прошел.mp3',
        'ooes - пирожок.mp3',
        'Scally Milano &ugg Stephan - Во Снах.mp3',
        '7azilov - Нежно х тримай.mp3',
        'Лицо - Антидепрессант.mp3',
        'Arctic Monkeys - Party Anthem.mp3',
        'The Kid Laroi - NIGHTS LIKE THIS (1).mp3',
        'squirrel-flower_-_conditions.mp3'
      ];

      const cassette = document.getElementById('cassette');
      const heartBtn = document.getElementById('heartBtn');
      const hint = document.getElementById('hint');
      const flowers = document.getElementById('flowers');
      const audioPlayer = document.getElementById('audioPlayer');
      const progress = document.getElementById('progress');
      const bar = document.getElementById('bar');
      const timeEl = document.getElementById('time');

      const kiss = document.getElementById('kiss');
      const loveText = document.getElementById('loveText');

      const missBtn = document.getElementById('missBtn');
      const missCount = document.getElementById('missCount');
      const loveBtn = document.getElementById('loveBtn');
      const resetTimer = document.getElementById('resetTimer');

      const flowerEmojis = ['🌸', '🌷', '🌺', '💮', '🌼'];

      let playing = false;
      let currentTrackIndex = -1;
      let count = 0;
      let loveCount = 0;
      let skipGuard = 0;

      audioPlayer.volume = 1;
      audioPlayer.preload = 'auto';

      function safeJsonParse(value, fallback = null) {
        try {
          return JSON.parse(value);
        } catch {
          return fallback;
        }
      }

      function formatTime(seconds) {
        if (!isFinite(seconds) || seconds < 0) return '0:00';
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${String(s).padStart(2, '0')}`;
      }

      function getRandomTrackIndex(excludeIndex = -1) {
        if (!playlist.length) return -1;
        if (playlist.length === 1) return 0;

        let newIndex;
        do {
          newIndex = Math.floor(Math.random() * playlist.length);
        } while (newIndex === excludeIndex);

        return newIndex;
      }

      function createFlower() {
        const el = document.createElement('div');
        el.className = 'flower';
        el.textContent = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.animationDuration = (3 + Math.random() * 5) + 's';
        el.style.fontSize = (16 + Math.random() * 20) + 'px';
        el.style.filter = `blur(${Math.random() * 0.4}px)`;
        flowers.appendChild(el);
        setTimeout(() => el.remove(), 8500);
      }

      setInterval(createFlower, 300);

      function stopCurrentAudio() {
        audioPlayer.pause();
        audioPlayer.removeAttribute('src');
        audioPlayer.load();
      }

      function updateHintByTrack(trackFile) {
        hint.textContent = `🎵 ${trackFile.replace(/\.mp3$/i, '')}`;
      }

      function stopPlaylist() {
        playing = false;
        cassette.classList.remove('playing');
        heartBtn.textContent = '♡';
        heartBtn.setAttribute('aria-label', 'Включить музыку');
        hint.textContent = 'нажми на сердечко';
        stopCurrentAudio();
        bar.style.width = '0%';
        timeEl.textContent = '0:00 / 0:00';
      }

      function playTrack(index, attempt = 0) {
        if (!playing || index < 0 || index >= playlist.length) return;
        if (attempt > playlist.length) {
          hint.textContent = 'не удалось загрузить трек';
          stopPlaylist();
          return;
        }

        currentTrackIndex = index;
        const trackFile = playlist[currentTrackIndex];

        stopCurrentAudio();

        try {
          audioPlayer.src = new URL(trackFile, document.baseURI).href;
        } catch {
          audioPlayer.src = trackFile;
        }

        audioPlayer.currentTime = 0;
        audioPlayer.load();

        updateHintByTrack(trackFile);

        audioPlayer.onended = () => {
          if (!playing) return;
          const nextIndex = getRandomTrackIndex(currentTrackIndex);
          playTrack(nextIndex, 0);
        };

        audioPlayer.onerror = () => {
          if (!playing) return;
          if (skipGuard > playlist.length + 2) {
            hint.textContent = 'проверь названия mp3';
            stopPlaylist();
            return;
          }
          skipGuard++;
          const nextIndex = getRandomTrackIndex(currentTrackIndex);
          playTrack(nextIndex, attempt + 1);
        };

        audioPlayer.play()
          .then(() => {
            skipGuard = 0;
            cassette.classList.add('playing');
            heartBtn.textContent = '❤';
            heartBtn.setAttribute('aria-label', 'Остановить музыку');
          })
          .catch((err) => {
            console.error('Не удалось запустить аудио:', err);
            hint.textContent = 'не удалось запустить трек — проверь путь к mp3';
            stopPlaylist();
          });
      }

      function startPlaylist() {
        if (!playlist.length) {
          hint.textContent = 'плейлист пуст';
          return;
        }
        const firstIndex = getRandomTrackIndex(-1);
        playTrack(firstIndex, 0);
      }

      heartBtn.addEventListener('click', () => {
        if (!playing) {
          playing = true;
          startPlaylist();
        } else {
          stopPlaylist();
        }
      });

      kiss.onclick = (e) => {
        e.stopPropagation();
        loveText.style.display = 'block';
        loveText.textContent = "Добавила в эту кассету песни… Теперь каждая из них ассоциируется только с тобой. Когда слышу — вспоминаю наши встречи. Те самые, которых мы так долго ждали, потому что мы не рядом, но сердцем — всегда друг к другу... Люблю тебя нежно. И очень-очень скучаю.";
      };

      document.addEventListener('click', () => {
        loveText.style.display = 'none';
      });

      loveText.addEventListener('click', (e) => e.stopPropagation());

      function updateProgress() {
        if (audioPlayer.duration && isFinite(audioPlayer.duration)) {
          const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
          bar.style.width = Math.max(0, Math.min(100, percent)) + '%';
          timeEl.textContent = `${formatTime(audioPlayer.currentTime)} / ${formatTime(audioPlayer.duration)}`;
        } else {
          bar.style.width = '0%';
          timeEl.textContent = '0:00 / 0:00';
        }
      }

      audioPlayer.addEventListener('timeupdate', updateProgress);
      audioPlayer.addEventListener('loadedmetadata', updateProgress);
      audioPlayer.addEventListener('durationchange', updateProgress);

      progress.addEventListener('click', (e) => {
        if (!audioPlayer.duration || !isFinite(audioPlayer.duration)) return;
        const rect = progress.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const percent = Math.max(0, Math.min(1, x / rect.width));
        audioPlayer.currentTime = percent * audioPlayer.duration;
      });

      function updateResetTimer() {
        const data = safeJsonParse(localStorage.getItem('missData'));
        if (!data || !data.reset) {
          resetTimer.textContent = '';
          return;
        }

        const resetDate = new Date(data.reset);
        const nextReset = new Date(resetDate.getTime() + 7 * 24 * 60 * 60 * 1000);
        const diff = nextReset - new Date();

        if (diff <= 0) {
          resetTimer.textContent = '';
          return;
        }

        const hours = Math.floor(diff / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        resetTimer.textContent = 'сброс через: ' + hours + 'ч ' + mins + 'м';
      }

      const savedLove = safeJsonParse(localStorage.getItem('loveData'));
      if (savedLove && savedLove.reset) {
        const lastResetLove = new Date(savedLove.reset);
        const diffDaysLove = (new Date() - lastResetLove) / (1000 * 60 * 60 * 24);
        if (diffDaysLove < 7) {
          loveCount = Number(savedLove.count) || 0;
        }
      }

      const saved = safeJsonParse(localStorage.getItem('missData'));
      if (saved && saved.reset) {
        const lastReset = new Date(saved.reset);
        const diffDays = (new Date() - lastReset) / (1000 * 60 * 60 * 24);
        if (diffDays < 7) {
          count = Number(saved.count) || 0;
        }
      }

      missCount.textContent = count;

      const loveCountEl = document.createElement('span');
      loveCountEl.style.marginLeft = '6px';
      loveBtn.appendChild(loveCountEl);
      loveCountEl.textContent = loveCount;

      missBtn.onclick = () => {
        count++;
        missCount.textContent = count;
        localStorage.setItem('missData', JSON.stringify({ count, reset: new Date().toISOString() }));
        updateResetTimer();
      };

      loveBtn.onclick = () => {
        loveCount++;
        loveCountEl.textContent = loveCount;
        localStorage.setItem('loveData', JSON.stringify({ count: loveCount, reset: new Date().toISOString() }));
      };

      setInterval(updateResetTimer, 60000);
      updateResetTimer();
    })();
  </script>
</body>
</html>
